name: deploy

# Runs after the `ci` workflow succeeds on main (so a red build never deploys),
# or on demand. Builds the four backend images, pushes them to GHCR, then ships
# the compose + deploy script to the server and pulls the new images there.
on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Images are pushed to Docker Hub (obchain219/volx-*). Requires repo secrets:
#   DOCKER_USERNAME  (obchain219)  DOCKER_PASSWORD  (Docker Hub access token)
#   SERVER_SSH_KEY                 (+ optional SERVER_KNOWN_HOSTS)

# One deploy at a time; never cancel mid-flight (would risk a half-applied
# stack). Queued runs wait their turn.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build:
    # Only on a successful CI run, or manual dispatch (no workflow_run payload).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { svc: api,       dockerfile: api/Dockerfile }
          - { svc: engine,    dockerfile: crates/engine/Dockerfile }
          - { svc: ingestion, dockerfile: crates/ingestion/Dockerfile }
          - { svc: keeper,    dockerfile: keeper/Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push ${{ matrix.svc }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/volx-${{ matrix.svc }}:latest
            ${{ secrets.DOCKER_USERNAME }}/volx-${{ matrix.svc }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.svc }}
          cache-to: type=gha,mode=max,scope=${{ matrix.svc }}

  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        uses: AnimMouse/setup-cloudflared@v2

      - name: Configure SSH over Cloudflare Access
        env:
          SSH_KEY_B64: ${{ secrets.SERVER_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.SERVER_KNOWN_HOSTS }}
          # Server identity (host alias + login user) come from secrets so the
          # deploy target is not hard-coded in the public workflow.
          SERVER_SSH_HOST: ${{ secrets.SERVER_SSH_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY_B64" | base64 --decode > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Pin the server host key when SERVER_KNOWN_HOSTS is provided (strict);
          # otherwise fall back to accept-new (TOFU) — never blanket "no".
          if [ -n "$KNOWN_HOSTS" ]; then
            printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
            chmod 644 ~/.ssh/known_hosts
            CHECK=yes
          else
            CHECK=accept-new
            echo "::warning::SERVER_KNOWN_HOSTS not set — using accept-new (TOFU). Set it (ssh-keyscan output) to pin the host key."
          fi
          cat > ~/.ssh/config <<EOF
          Host $SERVER_SSH_HOST
            User $SERVER_USER
            IdentityFile ~/.ssh/id_ed25519
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking $CHECK
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF

      - name: Ship compose + deploy script, then pull & apply
        env:
          # Deploy target (host alias + dir) from secrets — keep the server
          # identity out of the public workflow.
          SERVER_SSH_HOST: ${{ secrets.SERVER_SSH_HOST }}
          DEPLOY_DIR: ${{ secrets.SERVER_DEPLOY_DIR }}
          # Keeper runtime secrets — written into the server .env each deploy.
          # GitHub masks these values in the logs.
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          # Pin the server's registry to whatever CI pushed to, so the compose
          # default can never drift from the images that were just built.
          VOLX_REGISTRY: ${{ secrets.DOCKER_USERNAME }}
        run: |
          ssh "$SERVER_SSH_HOST" "mkdir -p $DEPLOY_DIR"
          scp docker/docker-compose.prod.yml "$SERVER_SSH_HOST:$DEPLOY_DIR/docker-compose.prod.yml"
          scp docker/clickhouse-init.sql     "$SERVER_SSH_HOST:$DEPLOY_DIR/clickhouse-init.sql"
          scp scripts/deploy.sh              "$SERVER_SSH_HOST:$DEPLOY_DIR/deploy.sh"
          # Write the runtime .env on the server from the GitHub secrets (umask
          # 077 -> 0600). docker compose auto-loads it; the keeper reads the keys.
          # Docker Hub repos must be PUBLIC (no server-side login is configured).
          ssh "$SERVER_SSH_HOST" "umask 077; cat > $DEPLOY_DIR/.env" <<EOF
          SEPOLIA_RPC_URL=$SEPOLIA_RPC_URL
          PRIVATE_KEY=$PRIVATE_KEY
          VOLX_REGISTRY=$VOLX_REGISTRY
          EOF
          ssh "$SERVER_SSH_HOST" "cd $DEPLOY_DIR && chmod +x deploy.sh && VOLX_TAG=latest ./deploy.sh"

      - name: Wipe SSH key
        if: always()
        run: shred -u ~/.ssh/id_ed25519 2>/dev/null || rm -f ~/.ssh/id_ed25519
