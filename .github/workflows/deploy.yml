name: deploy

# Runs after the `ci` workflow succeeds on main (so a red build never deploys),
# or on demand. Builds the four backend images, pushes them to GHCR, then ships
# the compose + deploy script to the server and pulls the new images there.
on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# One deploy at a time; never cancel mid-flight (would risk a half-applied
# stack). Queued runs wait their turn.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build:
    # Only on a successful CI run, or manual dispatch (no workflow_run payload).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only the build job pushes images; deploy needs nothing beyond read.
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { svc: api,       dockerfile: api/Dockerfile }
          - { svc: engine,    dockerfile: crates/engine/Dockerfile }
          - { svc: ingestion, dockerfile: crates/ingestion/Dockerfile }
          - { svc: keeper,    dockerfile: keeper/Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.svc }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/volx-${{ matrix.svc }}:latest
            ghcr.io/${{ github.repository_owner }}/volx-${{ matrix.svc }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.svc }}
          cache-to: type=gha,mode=max,scope=${{ matrix.svc }}

  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        uses: AnimMouse/setup-cloudflared@v2

      - name: Configure SSH over Cloudflare Access
        env:
          SSH_KEY_B64: ${{ secrets.SERVER_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.SERVER_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY_B64" | base64 --decode > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Pin the server host key when SERVER_KNOWN_HOSTS is provided (strict);
          # otherwise fall back to accept-new (TOFU) — never blanket "no".
          if [ -n "$KNOWN_HOSTS" ]; then
            printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
            chmod 644 ~/.ssh/known_hosts
            CHECK=yes
          else
            CHECK=accept-new
            echo "::warning::SERVER_KNOWN_HOSTS not set — using accept-new (TOFU). Set it (ssh-keyscan output) to pin the host key."
          fi
          cat > ~/.ssh/config <<EOF
          Host ssh.ancilar.com
            User ancilar
            IdentityFile ~/.ssh/id_ed25519
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking $CHECK
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF

      - name: Ship compose + deploy script, then pull & apply
        env:
          DEPLOY_DIR: /home/ancilar/volx-deploy
        run: |
          ssh ssh.ancilar.com "mkdir -p $DEPLOY_DIR"
          scp docker/docker-compose.prod.yml ssh.ancilar.com:"$DEPLOY_DIR/docker-compose.prod.yml"
          scp docker/clickhouse-init.sql     ssh.ancilar.com:"$DEPLOY_DIR/clickhouse-init.sql"
          scp scripts/deploy.sh              ssh.ancilar.com:"$DEPLOY_DIR/deploy.sh"
          # The server already holds $DEPLOY_DIR/.env (keeper secrets), placed
          # once by hand. deploy.sh pulls the freshly-pushed images and recreates
          # only the services whose digest changed.
          ssh ssh.ancilar.com "cd $DEPLOY_DIR && chmod +x deploy.sh && VOLX_TAG=latest ./deploy.sh"

      - name: Wipe SSH key
        if: always()
        run: shred -u ~/.ssh/id_ed25519 2>/dev/null || rm -f ~/.ssh/id_ed25519
