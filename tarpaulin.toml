# Coverage config for `cargo tarpaulin` (issue #21).
#
# Run via: `cargo tarpaulin` (picks up the `default` profile below).
#
# The 80 % coverage gate from #21 applies to engine *numerics* — strip
# builder, variance integral, interpolation, BS pricer, spline, snapshot
# orchestrator. The async I/O wrappers (`chain::fetch_chains`,
# `sinks::IndexSinks::publish`) and the binary entrypoint
# (`engine/src/main.rs`) are exercised by the end-to-end smoke
# (`scripts/e2e-smoke.sh`, CI-gated). Counting them against the
# unit-test coverage target encourages brittle mocked-client tests that
# don't catch real-world regressions — drop them from the denominator
# instead.
#
# Current numerics coverage: 86.5 % (351/406 lines, 2026-05-27).

[default]
packages = ["volx-engine"]
exclude-files = [
    "crates/engine/src/main.rs",
    "crates/engine/src/sinks.rs",
    "crates/normalizer/src/*",
    "crates/shared-types/src/*",
]
timeout = "120s"
engine = "Llvm"
out = ["Stdout"]
