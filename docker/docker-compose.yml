# Local dev compose for VolX (issue #14).
#
# Brings up the two persistent backends the M1 pipeline depends on:
# - ClickHouse 24.x — option ticks + index ticks (schema lands in #15)
# - Redis 7         — hot latest-value reads + WS pubsub fanout
#
# Production (Oracle Cloud Always Free) compose is `docker-compose.prod.yml`
# and is deferred to M3 — see PRD §13. This file is for `localhost`-only
# development; both services bind to 127.0.0.1 so a misconfigured firewall
# cannot accidentally expose them to the LAN.

name: volx-local

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: volx-clickhouse
    restart: unless-stopped
    ports:
      # HTTP + native ports, localhost-only. Inter-process MySQL + gRPC
      # ports are not exposed — they are unused for the M1 pipeline.
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    environment:
      CLICKHOUSE_DB: volx
      CLICKHOUSE_USER: default
      # No password in local dev. The ClickHouse port is bound to
      # 127.0.0.1 and the data lives on a developer laptop. Production
      # uses a separate compose with a Keychain-sourced password.
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    ulimits:
      # ClickHouse refuses to start with a low nofile cap on macOS Docker
      # Desktop. The values match the project's recommended minimums.
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      # Data is named-volume persisted across `down` (without `-v`).
      # Logs intentionally live in the container layer so they're wiped
      # on `down` — otherwise the trace + query logs grow without bound
      # on a long-running dev laptop and the only way to reclaim them
      # would be `docker compose down -v`, which also nukes the data.
      - clickhouse-data:/var/lib/clickhouse
      # Schema (#15). The official image runs every `*.sql` in this
      # directory once on the first cold init of the data volume.
      # Re-apply after edits with `docker compose down -v && up -d`.
      - ./clickhouse-init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      # `clickhouse-client --query "SELECT 1"` is the canonical liveness
      # probe; ships with the image, no extra deps.
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: volx-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command:
      - "redis-server"
      # AOF on, no password. Same localhost-only justification as above.
      # AOF + allkeys-lru is intentional cache semantics, not durable
      # storage: when memory hits the cap, Redis evicts LRU keys, and
      # the eviction (DEL) is recorded in the AOF — so a replay
      # reconstructs the *post-eviction* state. The latest-value cache +
      # pubsub workload is meant to be exactly that (lossy under
      # pressure), so this is correct rather than a footgun.
      - "--appendonly"
      - "yes"
      - "--maxmemory"
      - "256mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  # ─── Application services (issue #64) ────────────────────────────────
  #
  # Three binaries cover the full pipeline:
  # - ingestion:  WS connectors (Deribit + OKX + Bybit, in one process)
  #               + normalizer (in-process library) → ClickHouse + Redis
  # - engine:     60 s scheduler → per-venue strip + median blend +
  #               confidence + outlier drop → index_ticks + Redis
  # - api:        Go REST + WS surface for the published index
  #
  # The normalizer is a Rust library consumed by the ingestion binary,
  # not a separate service — splitting it would force a flume-channel
  # serialization layer for no operational benefit on a single host.
  #
  # `context: ..` everywhere because the Rust workspace lives at the
  # repo root and the per-crate Dockerfiles need to see Cargo.toml +
  # crates/* to feed cargo-chef.
  ingestion:
    build:
      context: ..
      dockerfile: crates/ingestion/Dockerfile
    container_name: volx-ingestion
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CLICKHOUSE_URL: "http://clickhouse:8123"
      CLICKHOUSE_DB: "volx"
      REDIS_URL: "redis://redis:6379"
      # Bind 0.0.0.0 so the Prometheus port published to the host
      # works. The localhost-only default is the right posture on a
      # dev box; inside a private compose network the all-interfaces
      # bind is safe.
      METRICS_BIND: "0.0.0.0:9100"
      RUST_LOG: "info,volx_ingestion=info,volx_normalizer=info"
    ports:
      - "127.0.0.1:9100:9100"
    healthcheck:
      # distroless/cc has no shell, no curl, no wget — the binary's
      # Prometheus exporter is the only network surface we can probe.
      # An HTTP GET against /metrics from a sibling temporary
      # container is the canonical pattern, but compose healthchecks
      # run inside the target container. Fall back to a TCP probe
      # via `nc` from an init-style sidecar would over-complicate
      # this; keep healthcheck off the distroless services and let
      # `depends_on` use the storage layer's healthchecks. The Go
      # API does its own /v1/health probe.
      disable: true

  engine:
    build:
      context: ..
      dockerfile: crates/engine/Dockerfile
    container_name: volx-engine
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Soft-depend on ingestion: the engine's chain query returns
      # empty until ingestion has written rows. The engine handles
      # empty cleanly (logs `MissingAsset`) so this is best-effort,
      # not a strict gate.
      ingestion:
        condition: service_started
    environment:
      CLICKHOUSE_URL: "http://clickhouse:8123"
      CLICKHOUSE_DB: "volx"
      REDIS_URL: "redis://redis:6379"
      METRICS_BIND: "0.0.0.0:9101"
      ENGINE_VENUES_EXPECTED: "3"
      RUST_LOG: "info,volx_engine=info"
    ports:
      - "127.0.0.1:9101:9101"
    healthcheck:
      disable: true

  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    container_name: volx-api
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # The Go driver (`clickhouse-go/v2`) speaks the **native TCP
      # protocol on port 9000**, not HTTP — distinct from the Rust
      # `clickhouse` crate which talks HTTP on 8123. Same database,
      # two ports; mismatched env vars here would silently fall
      # back to `127.0.0.1:9000` (loopback inside the api container)
      # and refuse to start. The clickhouse service exposes 9000
      # on the compose network so inter-container traffic resolves
      # `clickhouse:9000` natively.
      CLICKHOUSE_DSN: "clickhouse://default@clickhouse:9000?dial_timeout=2s"
      CLICKHOUSE_DB: "volx"
      REDIS_URL: "redis://redis:6379"
      # Bind all-interfaces so the published port works; same posture
      # as the Rust services above.
      API_BIND: "0.0.0.0:8080"
    ports:
      # Host 8090 → container 8080. Host 8080 conflicts with another
      # local listener (aether-monitor); keep VolX off it.
      - "127.0.0.1:8090:8080"
    healthcheck:
      # The Go distroless/static image still has no shell, but it
      # ships with `wget` available via busybox-style multicall on
      # gcr.io/distroless/static? No — `static` is truly minimal.
      # The fiber `/v1/health` endpoint is exposed; we probe it from
      # *outside* via the host port. Inside the container we have
      # only the binary itself. Disable the healthcheck and rely on
      # the operator's `curl localhost:8080/v1/health` from the host.
      disable: true

volumes:
  # Named volumes so `docker compose down` (without `-v`) preserves data
  # across restarts. Wipe with `docker compose down -v` when needed.
  clickhouse-data:
  redis-data:
